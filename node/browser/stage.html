<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Feed Looks Back — Stage</title>
    <style>
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #0a0a0d;
      }

      body {
        overflow: hidden;
      }

      #stage-root {
        width: 100vw;
        height: 100vh;
      }

      #stage-audio {
        display: none;
      }

      .stage-transport {
        position: fixed;
        left: 1rem;
        bottom: 1rem;
        box-sizing: border-box;
        display: grid;
        grid-template-columns: 32px 82px minmax(88px, 1fr) 32px;
        align-items: center;
        gap: 10px;
        width: min(23rem, calc(100vw - 2rem));
        min-height: 44px;
        padding: 7px 9px;
        z-index: 9999;
        color: #f1dce6;
        border: 1px solid rgba(226, 179, 194, 0.24);
        border-radius: 8px;
        background:
          linear-gradient(180deg, rgba(40, 24, 38, 0.82), rgba(16, 10, 16, 0.76)),
          rgba(12, 7, 12, 0.72);
        box-shadow:
          inset 0 1px 0 rgba(255, 235, 242, 0.06),
          0 10px 30px rgba(8, 5, 8, 0.34);
        -webkit-backdrop-filter: blur(14px) saturate(1.05);
        backdrop-filter: blur(14px) saturate(1.05);
        opacity: 0.86;
        transition: opacity 160ms ease, border-color 160ms ease, background 160ms ease;
      }

      .stage-transport[hidden] {
        display: none;
      }

      .stage-transport:hover,
      .stage-transport:focus-within {
        border-color: rgba(239, 208, 160, 0.42);
        opacity: 0.96;
      }

      .stage-transport-button {
        box-sizing: border-box;
        display: grid;
        place-items: center;
        width: 32px;
        height: 30px;
        padding: 0;
        color: #efd0a0;
        border: 1px solid rgba(239, 208, 160, 0.16);
        border-radius: 6px;
        background: rgba(8, 5, 8, 0.2);
        cursor: pointer;
      }

      .stage-transport-button:hover,
      .stage-transport-button:focus-visible {
        color: #f6dcbc;
        border-color: rgba(239, 208, 160, 0.42);
        background: rgba(239, 208, 160, 0.08);
        outline: none;
      }

      .stage-transport-button:active {
        transform: translateY(1px);
      }

      .stage-transport-time {
        overflow: hidden;
        color: rgba(234, 221, 228, 0.78);
        font: 12px/1.2 ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
        font-variant-numeric: tabular-nums;
        text-align: center;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .stage-transport-scrub {
        --audio-progress: 0%;
        min-width: 0;
        height: 22px;
        padding: 0;
        appearance: none;
        -webkit-appearance: none;
        background: transparent;
        cursor: pointer;
      }

      .stage-transport-scrub:focus-visible {
        outline: 1px solid rgba(239, 208, 160, 0.55);
        outline-offset: 5px;
      }

      .stage-transport-scrub::-webkit-slider-runnable-track {
        height: 3px;
        border-radius: 999px;
        background:
          linear-gradient(
            90deg,
            rgba(239, 208, 160, 0.92) 0%,
            rgba(239, 208, 160, 0.92) var(--audio-progress),
            rgba(202, 154, 176, 0.22) var(--audio-progress),
            rgba(202, 154, 176, 0.22) 100%
          );
      }

      .stage-transport-scrub::-moz-range-track {
        height: 3px;
        border-radius: 999px;
        background: rgba(202, 154, 176, 0.22);
      }

      .stage-transport-scrub::-moz-range-progress {
        height: 3px;
        border-radius: 999px;
        background: rgba(239, 208, 160, 0.92);
      }

      .stage-transport-scrub::-webkit-slider-thumb {
        width: 11px;
        height: 11px;
        margin-top: -4px;
        border: 1px solid rgba(8, 5, 8, 0.7);
        border-radius: 50%;
        appearance: none;
        -webkit-appearance: none;
        background: #f4d9b5;
        box-shadow: 0 0 0 3px rgba(239, 208, 160, 0.12);
      }

      .stage-transport-scrub::-moz-range-thumb {
        width: 11px;
        height: 11px;
        border: 1px solid rgba(8, 5, 8, 0.7);
        border-radius: 50%;
        background: #f4d9b5;
        box-shadow: 0 0 0 3px rgba(239, 208, 160, 0.12);
      }

      .stage-transport-scrub:disabled {
        cursor: default;
        opacity: 0.42;
      }

      .stage-transport-scrub:disabled::-webkit-slider-thumb {
        opacity: 0;
      }

      .stage-transport-scrub:disabled::-moz-range-thumb {
        opacity: 0;
      }

      .stage-icon-play {
        position: relative;
        width: 0;
        height: 0;
        margin-left: 2px;
        border-top: 5px solid transparent;
        border-bottom: 5px solid transparent;
        border-left: 8px solid currentColor;
      }

      .stage-transport.is-playing .stage-icon-play {
        width: 12px;
        height: 12px;
        margin-left: 0;
        border: 0;
      }

      .stage-transport.is-playing .stage-icon-play::before,
      .stage-transport.is-playing .stage-icon-play::after {
        content: "";
        position: absolute;
        top: 0;
        width: 3px;
        height: 12px;
        background: currentColor;
      }

      .stage-transport.is-playing .stage-icon-play::before {
        left: 2px;
      }

      .stage-transport.is-playing .stage-icon-play::after {
        right: 2px;
      }

      .stage-icon-volume {
        position: relative;
        width: 16px;
        height: 14px;
      }

      .stage-icon-volume::before {
        content: "";
        position: absolute;
        left: 1px;
        top: 4px;
        width: 5px;
        height: 6px;
        background: currentColor;
        clip-path: polygon(0 20%, 42% 20%, 100% 0, 100% 100%, 42% 80%, 0 80%);
      }

      .stage-icon-volume::after {
        content: "";
        position: absolute;
        right: 1px;
        top: 2px;
        width: 7px;
        height: 9px;
        border: 1.5px solid currentColor;
        border-left: 0;
        border-radius: 0 10px 10px 0;
      }

      .stage-transport.is-muted .stage-icon-volume::after {
        top: 6px;
        right: 0;
        width: 13px;
        height: 2px;
        border: 0;
        border-radius: 999px;
        background: currentColor;
        transform: rotate(-38deg);
      }

      @media (max-width: 560px) {
        .stage-transport {
          top: 1rem;
          bottom: auto;
          grid-template-columns: 32px 82px minmax(88px, 1fr) 32px;
          width: min(22rem, calc(100vw - 2rem));
          padding: 7px 8px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .stage-transport,
        .stage-transport-button {
          transition: none;
        }
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "zod": "/vendor/zod/index.js",
          "zod/": "/vendor/zod/"
        }
      }
    </script>
  </head>
  <body>
    <div id="stage-root"></div>
    <audio id="stage-audio" preload="auto"></audio>
    <div id="stage-transport" class="stage-transport" hidden aria-label="Audio transport">
      <button id="stage-audio-toggle" class="stage-transport-button" type="button" aria-label="Play audio">
        <span class="stage-icon-play" aria-hidden="true"></span>
      </button>
      <span id="stage-audio-time" class="stage-transport-time">0:00</span>
      <input
        id="stage-audio-progress"
        class="stage-transport-scrub"
        type="range"
        min="0"
        max="1"
        step="0.01"
        value="0"
        aria-label="Audio progress"
        disabled
      />
      <button id="stage-audio-mute" class="stage-transport-button" type="button" aria-label="Mute audio">
        <span class="stage-icon-volume" aria-hidden="true"></span>
      </button>
    </div>
    <script type="module">
      import { buildShowRedirectUrlFromLegacyHudSearch, loadBootstrap } from "/browser/bootstrap.mjs";
      import { createSceneReducer } from "/browser/scene_reducer.mjs";
      import { createWsClient } from "/browser/ws_client.mjs";
      import { createFeatureBus } from "/browser/feature_bus.mjs";
      import { createFeatureReplayer } from "/browser/feature_replayer.mjs";
      import { createBindingEngine } from "/browser/binding_engine.mjs";
      import { createP5Sandbox } from "/browser/p5_sandbox.mjs";
      import { createAudioVisualLayer } from "/browser/audio_visual_layer.mjs";
      import { initChainA } from "/browser/chain_a.mjs";

      const showRedirectUrl = window.self === window.top
        ? buildShowRedirectUrlFromLegacyHudSearch(window.location.search)
        : null;

      if (showRedirectUrl) {
        window.location.replace(showRedirectUrl);
      } else {
        const bootstrap = loadBootstrap({ locationLike: window.location, documentLike: document });
        const mount = document.getElementById("stage-root");
        const audio = document.getElementById("stage-audio");
        const transport = document.getElementById("stage-transport");

        function formatAudioTime(seconds) {
          if (!Number.isFinite(seconds) || seconds <= 0) return "0:00";
          const totalSeconds = Math.floor(seconds);
          const minutes = Math.floor(totalSeconds / 60);
          const secs = String(totalSeconds % 60).padStart(2, "0");
          return `${minutes}:${secs}`;
        }

        function setupAudioTransport() {
          if (!audio || !transport) return;
          const toggle = document.getElementById("stage-audio-toggle");
          const mute = document.getElementById("stage-audio-mute");
          const time = document.getElementById("stage-audio-time");
          const progress = document.getElementById("stage-audio-progress");
          if (!toggle || !mute || !time || !progress) return;

          transport.hidden = false;
          let frameId = null;

          function update() {
            const duration = Number.isFinite(audio.duration) && audio.duration > 0
              ? audio.duration
              : 0;
            const current = Math.min(audio.currentTime || 0, duration || audio.currentTime || 0);
            const pct = duration > 0 ? Math.max(0, Math.min(100, (current / duration) * 100)) : 0;
            transport.classList.toggle("is-playing", !audio.paused && !audio.ended);
            transport.classList.toggle("is-muted", audio.muted || audio.volume === 0);
            toggle.setAttribute("aria-label", audio.paused || audio.ended ? "Play audio" : "Pause audio");
            mute.setAttribute("aria-label", audio.muted || audio.volume === 0 ? "Unmute audio" : "Mute audio");
            time.textContent = duration > 0
              ? `${formatAudioTime(current)} / ${formatAudioTime(duration)}`
              : formatAudioTime(current);
            progress.disabled = duration <= 0;
            progress.max = String(duration || 1);
            progress.value = duration > 0 ? String(current) : "0";
            progress.style.setProperty("--audio-progress", `${pct}%`);
            progress.setAttribute(
              "aria-valuetext",
              duration > 0 ? `${formatAudioTime(current)} of ${formatAudioTime(duration)}` : formatAudioTime(current),
            );
          }

          function tick() {
            update();
            frameId = (!audio.paused && !audio.ended) ? window.requestAnimationFrame(tick) : null;
          }

          function requestFrame() {
            if (frameId == null) frameId = window.requestAnimationFrame(tick);
          }

          toggle.addEventListener("click", () => {
            if (audio.paused || audio.ended) {
              audio.play().catch(() => {});
            } else {
              audio.pause();
            }
            requestFrame();
          });

          mute.addEventListener("click", () => {
            audio.muted = !audio.muted;
            update();
          });

          progress.addEventListener("input", () => {
            const duration = Number.isFinite(audio.duration) && audio.duration > 0
              ? audio.duration
              : 0;
            if (duration <= 0) return;
            audio.currentTime = Math.max(0, Math.min(duration, Number(progress.value)));
            update();
          });

          for (const eventName of ["loadedmetadata", "durationchange", "timeupdate", "play", "pause", "ended", "volumechange"]) {
            audio.addEventListener(eventName, update);
          }
          audio.addEventListener("play", requestFrame);
          update();
        }

        const stageHasAudio = bootstrap.mode === "precompute" || bootstrap.audio === true;
        if (stageHasAudio) {
          setupAudioTransport();
          audio.src = `/run/${bootstrap.run_id}/audio.wav`;
          audio.autoplay = true;
          audio.loop = bootstrap.mode === "live" && bootstrap.audio === true;
          audio.addEventListener("canplay", () => {
            audio.play().catch(() => {
              // Browser autoplay policies often require the first user gesture.
            });
          }, { once: true });
          const removeUnlockHandlers = () => {
            document.removeEventListener("pointerdown", unlockAudio);
            document.removeEventListener("keydown", unlockAudio);
          };
          const unlockAudio = (event) => {
            if (transport?.contains(event.target)) return;
            audio.play().then(removeUnlockHandlers).catch(() => {});
          };
          document.addEventListener("pointerdown", unlockAudio);
          document.addEventListener("keydown", unlockAudio);
        } else {
          audio.remove();
          transport?.remove();
        }

        const bus = createFeatureBus();
        window.__featureBus = bus;

        const bindingEngine = createBindingEngine({ bus });
        window.__bindingEngine = bindingEngine;

        let replaying = false;

        function postP5Log(payload) {
          const body = JSON.stringify({
            run_id: bootstrap.run_id,
            ...payload,
          });
          fetch("/p5/log", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body,
            keepalive: true,
          }).catch(() => {});
        }

        const p5Sandbox = createP5Sandbox({
          mount,
          bus,
          // A thrown sketch surfaces here. Keep it console-level only;
          // retireAndReplace already mounts a figurative DOM fallback
          // in the slot so the stage never goes blank.
          onSketchError: (info) => {
            console.warn("[p5_sandbox] sketch error", info.sketch_id, info.message);
            if (!replaying) postP5Log({ level: "error", event: "sketch-error", ...info });
          },
          onSketchLog: (info) => {
            if (!replaying) postP5Log({ event: "console", ...info });
          },
          // Reason values: "retire" (author-driven), "remount" (same id
          // re-added), "dispose" (page teardown), "sketch-error"
          // (postMessage), "heartbeat-timeout" (watchdog).
          onRetire: (info) => {
            if (info.reason === "sketch-error" || info.reason === "heartbeat-timeout") {
              console.warn("[p5_sandbox] sketch retired", info.sketch_id, info.reason);
              if (!replaying) postP5Log({ level: "warn", event: "sketch-retire", ...info });
            }
          },
        });
        window.__p5Sandbox = p5Sandbox;

        const reducer = createSceneReducer({
          documentLike: document,
          mount,
          readyTarget: document.body,
          bindingEngine,
          p5Sandbox,
          featureBus: bus,
        });

        // Chain A — per-element audio-reactive effects layer (Maqam Bayati).
        // getBindingsFor reads the binding engine's live entries map so
        // chain_a's conflict protocol can skip writing properties already
        // bound by the reactivity system. Returns [{property}] to match
        // chain_a's expected shape; `feature` is not stored per-binding
        // in this codebase and chain_a only reads `b.property`.
        const getBindingsFor = (elementId) => {
          const entry = bindingEngine._entries?.get(elementId);
          if (!entry) return [];
          return (entry.bindings ?? []).map((b) => ({ property: b.property }));
        };
        try {
          window.__chainA = initChainA(bus, mount, { getBindingsFor });
        } catch (err) {
          console.warn("[chain_a] init failed", err);
        }
        try {
          window.__audioVisualLayer = createAudioVisualLayer({
            mount,
            bus,
            audioEl: stageHasAudio ? audio : null,
            onError: (err) => console.warn("[audio_visual_layer]", err),
          });
        } catch (err) {
          console.warn("[audio_visual_layer] disabled", err);
        }

        function handlePatch(patch) {
          if (patch?.type === "replay.begin") replaying = true;
          reducer.applyPatch(patch);
          if (!replaying) window.__audioVisualLayer?.triggerCommandPulse?.(patch);
          if (patch?.type === "replay.end") replaying = false;
        }

        createWsClient({
          run_id: bootstrap.run_id,
          mode: bootstrap.mode,
          onPatch: handlePatch,
          onFeature: (feature, value) => bus.dispatch(feature, value),
          onStatus: (event) => {
            if (event.type === "error") console.error("[stage ws]", event.message);
          },
        });

        if (bootstrap.mode === "precompute") {
          const replayer = createFeatureReplayer({
            bus,
            audioEl: audio,
            runId: bootstrap.run_id,
            onError: (err) => console.error("[feature_replayer]", err),
          });
          replayer.start();
        }
      }
    </script>
  </body>
</html>
