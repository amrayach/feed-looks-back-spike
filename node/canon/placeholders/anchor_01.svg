<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Bayati anchor: thin line of moonlight on still water at night.
       Replaces the earlier arched-niche silhouette.
       Single horizontal stroke of soft light catching a dark, still surface;
       the scene's sustained breath. -->
  <rect width="500" height="500" fill="#0c0906"/>
  <!-- distant horizon (very faint) -->
  <line x1="50" y1="240" x2="450" y2="240" stroke="#2a1f14" stroke-width="1" opacity="0.6"/>
  <!-- water surface ripples, faint -->
  <g stroke="#2a1f14" stroke-width="0.8" opacity="0.55" fill="none">
    <path d="M50 280 Q 250 274 450 280"/>
    <path d="M50 320 Q 250 314 450 320"/>
    <path d="M50 360 Q 250 356 450 360"/>
    <path d="M50 400 Q 250 396 450 400"/>
  </g>
  <!-- The line of moonlight: layered widths for soft halo -->
  <line x1="150" y1="250" x2="350" y2="250" stroke="#f5e6c8" stroke-width="1.4" opacity="0.92" stroke-linecap="round"/>
  <line x1="180" y1="250" x2="320" y2="250" stroke="#e8d4a0" stroke-width="3.2" opacity="0.55" stroke-linecap="round"/>
  <line x1="220" y1="250" x2="280" y2="250" stroke="#f5e6c8" stroke-width="6.5" opacity="0.32" stroke-linecap="round"/>
  <!-- distant moon, small, in the upper field -->
  <circle cx="250" cy="80" r="8" fill="#f5e6c8" opacity="0.78"/>
  <circle cx="250" cy="80" r="16" fill="#f5e6c8" opacity="0.18"/>
  <circle cx="250" cy="80" r="28" fill="#f5e6c8" opacity="0.06"/>
</svg>
