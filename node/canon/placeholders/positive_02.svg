<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Bayati positive: an open palm warming in low candlelight.
       Replaces the earlier arched-doorway-with-light-wash drawing.
       Interior gesture of care; the held breath of attention.
       The hand is figurative, not architectural. -->
  <rect width="500" height="500" fill="#0f0b08"/>
  <defs>
    <radialGradient id="warmGlow" cx="0.5" cy="0.32" r="0.55">
      <stop offset="0" stop-color="#f5e6c8" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#d4a574" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#1a1410" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- soft warm light from above -->
  <rect width="500" height="500" fill="url(#warmGlow)"/>
  <!-- the open palm: stylized, palm facing up, fingers loose -->
  <g transform="translate(250 320)" fill="#e8c28e" stroke="#c49565" stroke-width="1.6">
    <!-- palm base -->
    <path d="M-78 70 C -82 38, -76 6, -56 -16 L 56 -16 C 76 6, 82 38, 78 70 L 66 130 L -66 130 Z"/>
    <!-- thumb -->
    <path d="M-58 -10 C -100 -16, -118 -42, -104 -66 C -92 -84, -70 -84, -58 -72 L -56 -22 Z"/>
    <!-- four fingers, loose and slightly splayed -->
    <ellipse cx="-32" cy="-60" rx="10" ry="46"/>
    <ellipse cx="-10" cy="-72" rx="10" ry="56"/>
    <ellipse cx="14"  cy="-72" rx="10" ry="56"/>
    <ellipse cx="38"  cy="-60" rx="10" ry="46"/>
  </g>
  <!-- a small flame held above the palm -->
  <g transform="translate(250 220)">
    <ellipse cx="0" cy="0" rx="32" ry="48" fill="#d4a574" opacity="0.10"/>
    <ellipse cx="0" cy="0" rx="14" ry="28" fill="#e8d4a0" opacity="0.32"/>
    <ellipse cx="0" cy="0" rx="5"  ry="14" fill="#f5e6c8" opacity="0.95"/>
  </g>
</svg>
